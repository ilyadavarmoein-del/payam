<!DOCTYPE html>
<html lang="fa" dir="rtl">
<title>آکادمی سنگنوردی پیام</title>
<link href="../images/title1.jpg" rel="icon"/>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route Setting Portfolio</title>
    <style>
        :root { --accent: #00f2ff; --bg: #050505; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: #fff; overflow-x: hidden; }
        
        /* Video Background */
        .bg-video { position: fixed; inset: 0; z-index: -2; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4); }
        .overlay { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at center, transparent, #201f1f00); }

        .container { max-width: 1000px; margin: 0 auto; padding: 100px 20px; }
        
        /* Hero */
        header { height: 80vh; display: flex; flex-direction: column; justify-content: center; }
        h1 { font-size: 3rem; margin: 0; letter-spacing: -1px; }
        p.lead { font-size: 1.2rem; opacity: 0.7; max-width: 500px; }

        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 50px; }
        .card { 
            background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px;
            opacity: 0; transform: translateY(30px); transition: 0.8s ease-out;
        }
        .card.show { opacity: 1; transform: translateY(0); }
        .card img { width: 100%; border-radius: 12px; filter: grayscale(1); transition: 0.4s; }
        .card:hover img { filter: grayscale(0); transform: scale(1.02); }
        .card h3 { margin: 15px 0 5px; color: var(--accent); }
        
        /* Noise Effect */
        .noise { position: fixed; inset: 0; pointer-events: none; opacity: 0.03; z-index: 10; background-image: url('data:image/svg+xml,...'); }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline class="bg-video">
        <source src="../video/Recording 2026-06-03 115305.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>
    <div class="noise"></div>

    <main class="container">
        <header>
            <h1>Design Dept.</h1>
            <p class="lead">پورتفولیو تخصصی طراحی مسیر سنگنوردی و معماری حرکت.</p>
        </header>

        <section class="grid">
            <!-- کارت نمونه ۱ -->
            <div class="card">
                <img src="../images/amin-t.jpg" alt="Designer">
                <h3>امین کتابی</h3>
                <p>****************************</p>
            </div>
            <!-- کارت نمونه ۲ -->
            <div class="card">
                <img src="../images/RT.jpg" alt="Project">
                <h3>ارتیمس فرشاد یگانه</h3>
                <p>****************************</p>
            </div>
        </section>
    </main>

    <script>
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if(entry.isIntersecting) entry.target.classList.add('show');
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.card').forEach(card => observer.observe(card));
    </script>
</body>
</html>
